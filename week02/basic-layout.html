<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Tyler Allen">
</head>
<body>
    <header>
        <img src="./images/basic-logo.png" alt="A basic logo of a monitor displaying HTML" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://www.youtube.com/watch?v=iDLmYZ5HqgM">A certain pipe</a></li>
            <li><a href="https://www.youtube.com/watch?v=Aq5WXmQQooo">Definetly not a Rick Roll</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading the first</h2>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Doloremque, iusto.</p>
        </section>
        <section>
            <h2>Heading the second</h2>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Fuga, odit.</p>
        </section>
    </main>
    <aside>
        <img src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/kansas-city-missouri/800x500/kansas-city-temple-lds-994411-wallpaper.jpg" alt="Kansas City Missouri Temple" width="200">
    </aside>
    <footer>
        <p>Tyler Allen</p>
    </footer>
</body>
</html>
