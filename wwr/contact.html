<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - White Water Rafting</title>
    <meta name="Contact Us"
      content="The Contact Page will provide users with all the relevant information about contacting us.">
    <meta name="author" content="Tyler Allen">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/rafing-logo.png" alt="White Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="company-info">
            <h3>White Water Rapids</h3>
            <p>806 Waterbridge Boulevard</p>
            <p>Myrtle Beach, SC</p>
            <p>+1(555)123-1234</p>
            <p>totally_real@trustmail.gov</p>
        </section>
        <section id="map-form">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2789.0091609219776!2d-78.90603727084098!3d33.76817096310901!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89006eeb51ca5cc9%3A0x6046912cb1972db3!2s806%20Waterbridge%20Boulevard%2C%20Myrtle%20Beach%2C%20SC%2029579!5e0!3m2!1sen!2sus!4v1775258478768!5m2!1sen!2sus"
              width="420" height="500" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <div class="formbox">
                <form>
                    <div class="form-item column2">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="John Smith"
                          required>
                    </div>
                    <div class="form-item column2">
                        <label for="useremail">Email</label>
                        <input type="email" id="useremail" name="useremail"
                          placeholder="123abc@gmail.com" required>
                    </div>
                    <fieldset>
                        <legend>Message Purpose</legend>
                        <div class="radioset">
                            <input type="radio" id="general-inquary" name="purpose"
                              value="general-inquary" required>
                            <label for="general-inquary">General Inquary</label>
                            <input type="radio" id="reservation-question" name="purpose"
                              value="reservation-question" required>
                            <label for="reservation-question">Reservation Question</label>
                            <input type="radio" id="website-suggestion" name="purpose"
                              value="website-suggestion" required>
                            <label for="website-suggestion">Website Suggestion</label>

                        </div>
                    </fieldset>
                    <div class="form-item">
                        <label for="feedback">Message</label>
                        <textarea id="message" name="message" rows="4"
                          placeholder="Type here"></textarea>
                    </div>
                    <div class="checkedbox">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                    </div>
                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>
        <section id="profiles">
            <div class="profilebox">
                <h3>We Are Here to Serve You</h3>
                <div class="figbox">
                    <figure>
                        <img src="images/profile1.jpg" alt="Stock Profile Image">
                        <figcaption>Saul Goodwin</figcaption>
                    </figure>
                    <figure>
                        <img src="images/profile2.jpg" alt="Stock Profile Image">
                        <figcaption>Peter Quinbarra</figcaption>
                    </figure>
                    <figure>
                        <img src="images/profile3.jpg" alt="Stock Profile Image">
                        <figcaption>Steven Jaws</figcaption>
                    </figure>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy;2026 | White Water Rapids | Tyler Allen</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook_logo.png" alt="Facebook Logo">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin_logo.png" alt="Linkedin Logo">
            </a>
            <a href="https://youtube.com">
                <img src="images/youtube_logo.png" alt="Youtube Logo">
            </a>
        </nav>
    </footer>
</body>

</html>
